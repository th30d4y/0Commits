name: Auto Increment Counter (Every 10 Seconds - Unique Users)

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  increment:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        run: |
          # Make sure README has a counter line
          if [ ! -f README.md ]; then
            echo -e "# Repo\n\nCounter: 0" > README.md
          fi
          if ! grep -q "Counter: " README.md; then
            echo -e "\nCounter: 0" >> README.md
          fi
          echo "Counter is: $(grep 'Counter: ' README.md)"

          # Make sure used logins file exists
          touch .used_logins.txt

      - name: Fetch contributors and run loop
        run: |
          set +e  # Don't exit on error

          # ── Fetch logins from popular repos ──────────────────────────────
          LOGINS=()

          REPOS=(
            "torvalds/linux"
            "microsoft/vscode"
            "facebook/react"
            "golang/go"
            "kubernetes/kubernetes"
          )

          for REPO in "${REPOS[@]}"; do
            for PAGE in 1 2; do
              RESPONSE=$(curl -sf \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$REPO/contributors?per_page=30&page=$PAGE" 2>/dev/null)

              if [ -z "$RESPONSE" ]; then continue; fi

              # Extract logins one per line safely
              BATCH=$(echo "$RESPONSE" | jq -r '.[] | select(.type=="User") | select(.login | test("bot";"i") | not) | .login' 2>/dev/null)
              while IFS= read -r login; do
                [ -n "$login" ] && LOGINS+=("$login")
              done <<< "$BATCH"
            done
          done

          # Deduplicate
          UNIQUE_LOGINS=($(printf '%s\n' "${LOGINS[@]}" | sort -u))
          echo "Total unique humans: ${#UNIQUE_LOGINS[@]}"

          # Filter out already used logins
          FRESH_LOGINS=()
          for login in "${UNIQUE_LOGINS[@]}"; do
            if ! grep -qx "$login" .used_logins.txt; then
              FRESH_LOGINS+=("$login")
            fi
          done

          echo "Fresh unused: ${#FRESH_LOGINS[@]}"

          # Reset if all used
          if [ ${#FRESH_LOGINS[@]} -eq 0 ]; then
            echo "All used — resetting!"
            > .used_logins.txt
            FRESH_LOGINS=("${UNIQUE_LOGINS[@]}")
          fi

          # ── Loop every 10 seconds ─────────────────────────────────────────
          TOTAL=${#FRESH_LOGINS[@]}
          ITERATION=0
          END_TIME=$(( $(date +%s) + 270 ))

          git config pull.rebase false

          while [ $(date +%s) -lt $END_TIME ] && [ $ITERATION -lt $TOTAL ]; do

            LOGIN="${FRESH_LOGINS[$ITERATION]}"
            echo "[$ITERATION] Fetching profile for: $LOGIN"

            PROFILE=$(curl -sf \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/users/$LOGIN" 2>/dev/null)

            if [ -z "$PROFILE" ]; then
              echo "Could not fetch profile for $LOGIN, skipping"
              ITERATION=$(( ITERATION + 1 ))
              continue
            fi

            NAME=$(echo "$PROFILE" | jq -r '.name // .login' 2>/dev/null)
            EMAIL=$(echo "$PROFILE" | jq -r '.email // empty' 2>/dev/null)

            [ -z "$NAME" ] && NAME="$LOGIN"
            [ -z "$EMAIL" ] && EMAIL="${LOGIN}@users.noreply.github.com"

            echo "Committing as: $NAME <$EMAIL>"

            # Pull latest
            git pull origin main --no-edit 2>/dev/null || true

            # Read counter
            CURRENT=$(grep -oP '(?<=Counter: )\d+' README.md 2>/dev/null || echo "0")
            NEW=$(( CURRENT + 2 ))

            # Update counter
            sed -i "s/Counter: ${CURRENT}/Counter: ${NEW}/" README.md

            # Mark login as used
            echo "$LOGIN" >> .used_logins.txt

            # Commit and push
            git config user.name  "$NAME"
            git config user.email "$EMAIL"
            git add README.md .used_logins.txt
            git commit -m "chore: increment counter to $NEW (by @$LOGIN)" 2>/dev/null
            git push origin main 2>/dev/null

            echo "✅ $NAME → counter $CURRENT → $NEW"

            ITERATION=$(( ITERATION + 1 ))
            sleep 10
          done

          echo "✅ Loop complete — $ITERATION commits made."
