name: Auto Increment Counter (Every 10 Seconds - Unique Users)

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  increment:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure counter exists in README
        run: |
          # Auto-create README with counter if missing or counter line missing
          if [ ! -f README.md ]; then
            echo "# My Repo" > README.md
            echo "" >> README.md
            echo "Counter: 0" >> README.md
            echo "Created README.md with counter"
          elif ! grep -q "Counter: " README.md; then
            echo "" >> README.md
            echo "Counter: 0" >> README.md
            echo "Added Counter line to existing README.md"
          else
            echo "Counter found: $(grep -oP '(?<=Counter: )\d+' README.md)"
          fi

      - name: Fetch fresh unique users from popular repos
        run: |
          echo "Fetching real human contributors..."

          if [ -f .used_logins.txt ]; then
            USED_LOGINS=$(cat .used_logins.txt)
          else
            USED_LOGINS=""
            touch .used_logins.txt
          fi

          REPO_LIST=(
            "torvalds/linux"
            "microsoft/vscode"
            "facebook/react"
            "golang/go"
            "kubernetes/kubernetes"
            "nodejs/node"
            "django/django"
            "rails/rails"
          )

          ALL_HUMANS="[]"

          for REPO in "${REPO_LIST[@]}"; do
            for PAGE in 1 2 3; do
              RESULT=$(curl -s \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$REPO/contributors?per_page=30&page=$PAGE")

              HUMANS=$(echo "$RESULT" | jq '[.[] | select(.type == "User") | select(.login | test("\\[bot\\]$") | not)] // []')
              ALL_HUMANS=$(echo "[$ALL_HUMANS, $HUMANS]" | jq 'add | unique_by(.login)')
            done
          done

          echo "Total humans fetched: $(echo "$ALL_HUMANS" | jq length)"

          # Filter out already used logins
          FRESH=$(echo "$ALL_HUMANS" | jq --arg used "$USED_LOGINS" '
            ($used | split("\n") | map(select(. != ""))) as $usedList |
            [.[] | select(.login as $l | ($usedList | index($l)) == null)]
          ')

          TOTAL=$(echo "$FRESH" | jq length)
          echo "Fresh unused humans: $TOTAL"

          # If all used, reset
          if [ "$TOTAL" -eq 0 ]; then
            echo "All users exhausted — resetting!"
            > .used_logins.txt
            FRESH="$ALL_HUMANS"
            TOTAL=$(echo "$FRESH" | jq length)
          fi

          echo "$FRESH" > /tmp/contributors.json
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV

      - name: Loop — commit every 10 seconds, each user only once
        run: |
          TOTAL=${{ env.TOTAL }}
          ITERATION=0
          END_TIME=$(( $(date +%s) + 270 ))

          git config pull.rebase false
          touch .used_logins.txt

          while [ $(date +%s) -lt $END_TIME ]; do

            INDEX=$(( ITERATION % TOTAL ))
            LOGIN=$(jq -r ".[$INDEX].login" /tmp/contributors.json)

            # Skip if already used
            if grep -qx "$LOGIN" .used_logins.txt 2>/dev/null; then
              echo "Skipping $LOGIN — already used"
              ITERATION=$(( ITERATION + 1 ))
              sleep 2
              continue
            fi

            # Fetch real profile
            PROFILE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/users/$LOGIN")

            NAME=$(echo "$PROFILE" | jq -r '.name // .login')
            EMAIL=$(echo "$PROFILE" | jq -r --arg login "$LOGIN" \
              'if (.email != null and .email != "") then .email else ($login + "@users.noreply.github.com") end')

            echo "[$ITERATION] Committing as: $NAME <$EMAIL>"

            # Pull latest
            git pull origin main --no-edit 2>/dev/null || true

            # Read current counter safely
            CURRENT=$(grep -oP '(?<=Counter: )\d+' README.md || echo "0")
            NEW=$(( CURRENT + 2 ))

            # Update counter
            sed -i "s/Counter: ${CURRENT}/Counter: ${NEW}/" README.md

            # Verify update worked
            VERIFY=$(grep -oP '(?<=Counter: )\d+' README.md || echo "0")
            if [ "$VERIFY" != "$NEW" ]; then
              echo "Counter update failed, skipping commit"
              ITERATION=$(( ITERATION + 1 ))
              sleep 5
              continue
            fi

            # Mark as used
            echo "$LOGIN" >> .used_logins.txt

            # Commit
            git config user.name  "$NAME"
            git config user.email "$EMAIL"
            git add README.md .used_logins.txt
            git commit -m "chore: increment counter to $NEW (by @$LOGIN)"
            git push origin main

            echo "✅ $NAME → $CURRENT → $NEW"

            ITERATION=$(( ITERATION + 1 ))
            sleep 10
          done

          echo "✅ Done — $ITERATION commits made."
