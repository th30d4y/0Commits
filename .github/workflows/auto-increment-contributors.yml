name: Auto Increment Counter (Every 10 Seconds)

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  increment:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch real users from popular public repos
        id: contributors
        run: |
          echo "Fetching real GitHub users from popular repos..."

          # Pull contributors from multiple big public repos for variety
          REPO_LIST=(
            "torvalds/linux"
            "microsoft/vscode"
            "facebook/react"
          )

          ALL_HUMANS="[]"

          for REPO in "${REPO_LIST[@]}"; do
            echo "Fetching from $REPO..."
            RESULT=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/contributors?per_page=20")

            # Filter only real humans
            HUMANS=$(echo "$RESULT" | jq '[.[] | select(.type == "User") | select(.login | test("\\[bot\\]$") | not)]')

            # Merge into master list
            ALL_HUMANS=$(echo "$ALL_HUMANS $HUMANS" | jq -s 'add | unique_by(.login)')
          done

          TOTAL=$(echo "$ALL_HUMANS" | jq length)
          echo "Total unique human contributors: $TOTAL"

          echo "humans=$ALL_HUMANS" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL"       >> "$GITHUB_OUTPUT"

      - name: Loop — commit every 10 seconds for ~4m30s
        run: |
          HUMANS='${{ steps.contributors.outputs.humans }}'
          TOTAL=${{ steps.contributors.outputs.total }}
          ITERATION=0
          END_TIME=$(( $(date +%s) + 270 ))

          git config pull.rebase false

          while [ $(date +%s) -lt $END_TIME ]; do

            # Rotate through contributors
            INDEX=$(( ITERATION % TOTAL ))
            LOGIN=$(echo "$HUMANS" | jq -r ".[$INDEX].login")

            # Fetch their real GitHub profile
            PROFILE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/users/$LOGIN")

            NAME=$(echo "$PROFILE"  | jq -r '.name // .login')
            EMAIL=$(echo "$PROFILE" | jq -r --arg login "$LOGIN" \
              'if .email and .email != "" and .email != "null" then .email else ($login + "@users.noreply.github.com") end')

            echo "[$ITERATION] Committing as: $NAME <$EMAIL>"

            # Pull latest to avoid conflicts
            git pull origin main --no-edit 2>/dev/null || true

            # Increment counter
            CURRENT=$(grep -oP '(?<=Counter: )\d+' README.md)
            NEW=$(( CURRENT + 2 ))
            sed -i "s/Counter: ${CURRENT}/Counter: ${NEW}/" README.md

            # Commit and push
            git config user.name  "$NAME"
            git config user.email "$EMAIL"
            git add README.md
            git commit -m "chore: increment counter to $NEW (by @$LOGIN)"
            git push origin main

            echo "✅ $NAME → counter $CURRENT → $NEW"

            ITERATION=$(( ITERATION + 1 ))
            sleep 10
          done

          echo "✅ Loop done — $ITERATION commits made."
