name: Auto Increment Counter (Auto-Fetch Contributors)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

permissions:
  contents: write

jobs:
  increment:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch top contributors from GitHub API
        id: pick
        run: |
          echo "Fetching top contributors for ${{ github.repository }}..."

          # Fetch top 10 contributors via GitHub API
          CONTRIBUTORS=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/contributors?per_page=10")

          TOTAL=$(echo "$CONTRIBUTORS" | jq length)
          echo "Found $TOTAL contributors"

          if [ "$TOTAL" -eq 0 ]; then
            echo "No contributors found, using repo owner as fallback"
            LOGIN="${{ github.repository_owner }}"
          else
            # Rotate using run number
            INDEX=$(( ${{ github.run_number }} % TOTAL ))
            LOGIN=$(echo "$CONTRIBUTORS" | jq -r ".[$INDEX].login")
            echo "Selected contributor slot $INDEX: $LOGIN"
          fi

          # Fetch the selected user's public profile
          PROFILE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/$LOGIN")

          # Use display name if available, else fall back to login
          NAME=$(echo "$PROFILE" | jq -r '.name // .login')

          # Use public email if available, else use GitHub no-reply address
          EMAIL=$(echo "$PROFILE" | jq -r \
            --arg login "$LOGIN" \
            '.email // ($login + "@users.noreply.github.com")')

          echo "Committing as: $NAME <$EMAIL>"
          echo "name=$NAME"   >> "$GITHUB_OUTPUT"
          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"
          echo "login=$LOGIN" >> "$GITHUB_OUTPUT"

      - name: Increment counter in README
        id: counter
        run: |
          CURRENT=$(grep -oP '(?<=Counter: )\d+' README.md)
          NEW=$(( CURRENT + 2 ))
          sed -i "s/Counter: ${CURRENT}/Counter: ${NEW}/" README.md
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW"         >> "$GITHUB_OUTPUT"
          echo "Counter updated: $CURRENT → $NEW"

      - name: Commit and push as fetched contributor
        run: |
          git config user.name  "${{ steps.pick.outputs.name }}"
          git config user.email "${{ steps.pick.outputs.email }}"
          git add README.md
          git commit -m "chore: increment counter to ${{ steps.counter.outputs.new }}

          Auto-commit by @${{ steps.pick.outputs.login }}
          Previous value: ${{ steps.counter.outputs.current }}"
          git push

      - name: Summary
        run: |
          echo "### Counter Update" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| GitHub User | @${{ steps.pick.outputs.login }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Display Name | ${{ steps.pick.outputs.name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Email | ${{ steps.pick.outputs.email }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Counter | ${{ steps.counter.outputs.current }} → ${{ steps.counter.outputs.new }} |" >> "$GITHUB_STEP_SUMMARY"
