name: Auto Increment Counter (Every 10 Seconds)

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'   # GitHub minimum — runs every 5 minutes
                              # The job itself loops every 10s internally

permissions:
  contents: write

jobs:
  increment:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch human contributors once
        id: contributors
        run: |
          echo "Fetching contributors for ${{ github.repository }}..."

          ALL=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/contributors?per_page=30")

          # Filter real humans only (no bots)
          HUMANS=$(echo "$ALL" | jq -c '[.[] | select(.type == "User") | select(.login | test("\\[bot\\]$") | not)]')

          TOTAL=$(echo "$HUMANS" | jq length)
          echo "Human contributors found: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            # Fallback: repo owner
            OWNER_PROFILE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/users/${{ github.repository_owner }}")
            HUMANS=$(echo "[{\"login\":\"${{ github.repository_owner }}\",\"type\":\"User\"}]")
            TOTAL=1
          fi

          echo "humans=$HUMANS"   >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL"     >> "$GITHUB_OUTPUT"

      - name: Loop — commit every 10 seconds for ~5 minutes
        run: |
          HUMANS='${{ steps.contributors.outputs.humans }}'
          TOTAL=${{ steps.contributors.outputs.total }}
          ITERATION=0
          END_TIME=$(( $(date +%s) + 270 ))   # run for 4m30s to stay within 5m job window

          git config pull.rebase false

          while [ $(date +%s) -lt $END_TIME ]; do

            # Pick contributor by iteration (rotates through all humans)
            INDEX=$(( ITERATION % TOTAL ))
            LOGIN=$(echo "$HUMANS" | jq -r ".[$INDEX].login")

            # Fetch fresh profile each time
            PROFILE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/users/$LOGIN")

            NAME=$(echo "$PROFILE"  | jq -r '.name // .login')
            EMAIL=$(echo "$PROFILE" | jq -r --arg login "$LOGIN" \
              'if .email and .email != "" and .email != "null" then .email else ($login + "@users.noreply.github.com") end')

            echo "[$ITERATION] Committing as: $NAME <$EMAIL>"

            # Pull latest to avoid conflicts
            git pull origin main --no-edit 2>/dev/null || true

            # Read and increment counter
            CURRENT=$(grep -oP '(?<=Counter: )\d+' README.md)
            NEW=$(( CURRENT + 2 ))
            sed -i "s/Counter: ${CURRENT}/Counter: ${NEW}/" README.md

            # Commit and push
            git config user.name  "$NAME"
            git config user.email "$EMAIL"
            git add README.md
            git commit -m "chore: increment counter to $NEW (by @$LOGIN)"
            git push origin main

            echo "✅ Done — counter $CURRENT → $NEW"

            ITERATION=$(( ITERATION + 1 ))
            sleep 10
          done

          echo "Loop finished after $ITERATION commits."
